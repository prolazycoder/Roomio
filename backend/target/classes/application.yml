server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pg-hostel-core
  
  datasource:
    url: jdbc:postgresql://localhost:5432/hostel_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HostelHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        # Shared-schema multi-tenancy configurations can be plugged in here if switching to database/schema level later
        multiTenancy: NONE
        default_schema: public

# Custom JWT configuration properties
app:
  jwt:
    secret: 9a4f2c8d3b7a1e5f8c6d4e2b0a8f7e6d5c4b3a2e1f0d9c8b7a6f5e4d3c2b1a0f9a4f2c8d3b7a1e5f8c6d4e2b0a8f7e6d5c4b3a2e1f0d9c8b7a6f5e4d3c2b1a0f
    access-token-expiration-ms: 900000 # 15 minutes (short-lived JWT for auto-refresh validation)
    refresh-token-expiration-ms: 604800000 # 7 days
