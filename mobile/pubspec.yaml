name: hostel_app_mobile
description: "Flutter Mobile Application for PG/Hostel Management SaaS"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2

  # Networking & HTTP Interceptors
  dio: ^5.4.3

  # Secure Local Storage (for JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Helper packages
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
